server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # gzip compression
    gzip on;
    gzip_types
        text/css
        application/javascript
        application/json
        image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # SPA routing — serve index.html for all unmatched paths
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Docker embedded DNS — resolves service names at request time, not startup.
    # Without this, nginx fails with "host not found in upstream" if the backend
    # container isn't up yet when nginx starts.
    resolver 127.0.0.11 valid=30s;

    # API proxy — forward /api/ requests to the backend service.
    # CloudFront notes:
    #   - $remote_addr is the CloudFront edge IP, not the real client.
    #     Real client IP is in the X-Forwarded-For chain CloudFront appends to.
    #   - X-Forwarded-Proto must use $http_x_forwarded_proto (CloudFront's value)
    #     rather than $scheme, because CF→nginx is always HTTP even when the
    #     viewer used HTTPS. CloudFront forwards X-Forwarded-Proto when it is
    #     listed in the cache behaviour's ForwardedValues headers.
    location /api/ {
        set $backend http://app:8000;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }
}
